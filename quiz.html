<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Take Quiz — QuizOS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">Quiz<span>OS</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="quiz.html">Take Quiz</a>
      <a href="result.html">Results</a>
    </div>
  </nav>

  <div class="quiz-layout">

    <!-- MAIN QUESTION AREA -->
    <div class="quiz-main">
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" id="progressFill" style="width:10%"></div>
      </div>

      <div class="question-meta">
        <span class="q-number" id="qNumber">Q 1 / 10</span>
        <span class="q-category" id="qCategory">Java</span>
        <span class="q-marks" id="qMarks">1 mark</span>
      </div>

      <div class="question-text" id="questionText">Loading question...</div>

      <div class="options-grid" id="optionsGrid">
        <!-- Options rendered by JS -->
      </div>

      <div class="quiz-actions">
        <button class="btn outline" id="prevBtn" onclick="prevQuestion()">← Previous</button>
        <span id="answerFeedback" style="font-size:0.9rem; font-weight:500; color:var(--muted);"></span>
        <button class="btn accent" id="nextBtn" onclick="nextQuestion()">Next →</button>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div class="quiz-sidebar">

      <!-- Timer -->
      <div class="timer-box">
        <div class="timer-label">Time Remaining</div>
        <div class="timer-val" id="timerVal">30</div>
      </div>

      <!-- Question Navigator -->
      <div class="nav-label">Questions</div>
      <div class="q-nav-grid" id="qNavGrid">
        <!-- Generated by JS -->
      </div>

      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--ink)"></div><span>Answered</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent); border-radius:50%"></div><span>Current</span></div>
        <div class="legend-item"><div class="legend-dot" style="border:2px solid var(--ink)"></div><span>Not visited</span></div>
      </div>

      <button class="btn" style="width:100%; justify-content:center;" onclick="submitQuiz()">
        Submit Quiz
      </button>
    </div>

  </div>

  <script>
    // ─── QUIZ DATA (mirrors Java QuizLogic.java) ───────────────────────────
    // Large question bank (25 questions)
const ALL_QUESTIONS = [
  { text: "Which of the following is NOT a Java primitive type?", options: ["int", "boolean", "String", "char"], correct: 2, category: "Java", marks: 1 },
  { text: "What does JVM stand for?", options: ["Java Virtual Machine", "Java Variable Model", "Java Version Manager", "Java Visual Module"], correct: 0, category: "Java", marks: 1 },
  { text: "Which keyword is used to inherit a class in Java?", options: ["implements", "extends", "inherits", "super"], correct: 1, category: "Java", marks: 1 },
  { text: "What is the default value of an int variable in Java?", options: ["null", "1", "0", "undefined"], correct: 2, category: "Java", marks: 1 },
  { text: "Which of these is used to handle exceptions in Java?", options: ["try-catch", "if-else", "switch-case", "for-loop"], correct: 0, category: "Java", marks: 1 },
  { text: "Which access modifier makes a member accessible only within the same class?", options: ["public", "protected", "default", "private"], correct: 3, category: "Java", marks: 1 },
  { text: "What is the size of int in Java?", options: ["8 bits", "16 bits", "32 bits", "64 bits"], correct: 2, category: "Java", marks: 1 },
  { text: "Which method is the entry point of a Java program?", options: ["start()", "run()", "main()", "init()"], correct: 2, category: "Java", marks: 1 },
  { text: "What does the 'static' keyword mean in Java?", options: ["The variable changes every run", "The member belongs to the class, not instances", "The method cannot return a value", "The class cannot be extended"], correct: 1, category: "Java", marks: 1 },
  { text: "Which Java keyword is used to prevent a class from being subclassed?", options: ["static", "abstract", "final", "private"], correct: 2, category: "Java", marks: 1 },
  { text: "What is Encapsulation in OOP?", options: ["Hiding internal data and providing public access methods", "Creating multiple objects from one class", "Deriving a new class from existing class", "Overloading methods with same name"], correct: 0, category: "OOP", marks: 1 },
  { text: "Which OOP concept allows a class to have multiple forms?", options: ["Inheritance", "Encapsulation", "Polymorphism", "Abstraction"], correct: 2, category: "OOP", marks: 1 },
  { text: "What is an abstract class?", options: ["A class that cannot be inherited", "A class that cannot be instantiated and may have abstract methods", "A class with only static methods", "A class with private constructor"], correct: 1, category: "OOP", marks: 1 },
  { text: "Which OOP principle allows a subclass to provide a specific implementation of a method in parent class?", options: ["Overloading", "Overriding", "Encapsulation", "Abstraction"], correct: 1, category: "OOP", marks: 1 },
  { text: "What is an interface in Java?", options: ["A class with only static methods", "A blueprint with abstract methods that a class must implement", "A type of constructor", "A final class"], correct: 1, category: "OOP", marks: 1 },
  { text: "Which keyword is used to implement an interface?", options: ["extends", "inherits", "implements", "uses"], correct: 2, category: "OOP", marks: 1 },
  { text: "Which data structure follows LIFO order?", options: ["Queue", "Stack", "Array", "LinkedList"], correct: 1, category: "Data Structures", marks: 1 },
  { text: "What is the time complexity of binary search?", options: ["O(n)", "O(n²)", "O(log n)", "O(1)"], correct: 2, category: "Data Structures", marks: 1 },
  { text: "Which data structure follows FIFO order?", options: ["Stack", "Queue", "Tree", "Graph"], correct: 1, category: "Data Structures", marks: 1 },
  { text: "What is the worst-case time complexity of bubble sort?", options: ["O(n)", "O(n log n)", "O(n²)", "O(log n)"], correct: 2, category: "Data Structures", marks: 1 },
  { text: "Which data structure is used to implement recursion?", options: ["Queue", "Stack", "Array", "LinkedList"], correct: 1, category: "Data Structures", marks: 1 },
  { text: "What is a HashMap in Java?", options: ["A sorted list of values", "A key-value pair collection with O(1) average access", "A type of linked list", "A stack-based structure"], correct: 1, category: "Data Structures", marks: 1 },
  { text: "In a binary tree, how many children can a node have at most?", options: ["1", "2", "3", "Unlimited"], correct: 1, category: "Data Structures", marks: 1 },
  { text: "Which sorting algorithm has the best average-case time complexity?", options: ["Bubble Sort", "Insertion Sort", "Merge Sort", "Selection Sort"], correct: 2, category: "Data Structures", marks: 1 },
  { text: "What does ArrayList use internally in Java?", options: ["LinkedList", "Array", "Stack", "HashMap"], correct: 1, category: "Data Structures", marks: 1 },
];

// Pick 10 random questions every time
const QUESTIONS = ALL_QUESTIONS.sort(() => Math.random() - 0.5).slice(0, 10);

    // ─── STATE ─────────────────────────────────────────────────────────────
    let currentIdx = 0;
    let userAnswers = new Array(QUESTIONS.length).fill(-1);
    let timerInterval = null;
    let timeLeft = 30;
    let quizSubmitted = false;

    // ─── INIT ──────────────────────────────────────────────────────────────
    function init() {
      buildNavGrid();
      renderQuestion(0);
      startTimer();
    }

    function buildNavGrid() {
      const grid = document.getElementById('qNavGrid');
      grid.innerHTML = '';
      QUESTIONS.forEach((_, i) => {
        const btn = document.createElement('button');
        btn.className = 'q-nav-btn';
        btn.textContent = i + 1;
        btn.onclick = () => goToQuestion(i);
        btn.id = `navBtn${i}`;
        grid.appendChild(btn);
      });
    }

    function renderQuestion(idx) {
      const q = QUESTIONS[idx];
      document.getElementById('qNumber').textContent = `Q ${idx + 1} / ${QUESTIONS.length}`;
      document.getElementById('qCategory').textContent = q.category;
      document.getElementById('qMarks').textContent = q.marks + (q.marks > 1 ? ' marks' : ' mark');
      document.getElementById('questionText').textContent = q.text;
      document.getElementById('answerFeedback').textContent = '';

      // Progress
      document.getElementById('progressFill').style.width = ((idx + 1) / QUESTIONS.length * 100) + '%';

      // Options
      const grid = document.getElementById('optionsGrid');
      grid.innerHTML = '';
      const letters = ['A', 'B', 'C', 'D'];
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        if (userAnswers[idx] === i) btn.classList.add('selected');
        btn.innerHTML = `<span class="option-letter">${letters[i]}</span> ${opt}`;
        btn.onclick = () => selectAnswer(idx, i, btn);
        grid.appendChild(btn);
      });

      // Nav buttons
      document.querySelectorAll('.q-nav-btn').forEach((b, i) => {
        b.classList.remove('current', 'answered');
        if (i === idx) b.classList.add('current');
        else if (userAnswers[i] !== -1) b.classList.add('answered');
      });

      // Prev button
      document.getElementById('prevBtn').disabled = idx === 0;
      document.getElementById('prevBtn').style.opacity = idx === 0 ? '0.3' : '1';

      // Last question changes button
      const nextBtn = document.getElementById('nextBtn');
      nextBtn.textContent = idx === QUESTIONS.length - 1 ? 'Finish →' : 'Next →';

      resetTimer();
    }

    function selectAnswer(qIdx, optIdx, btn) {
      if (quizSubmitted) return;
      userAnswers[qIdx] = optIdx;

      const btns = document.querySelectorAll('.option-btn');
      btns.forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');

      // Update nav
      const navBtn = document.getElementById(`navBtn${qIdx}`);
      if (navBtn) { navBtn.classList.remove('current'); navBtn.classList.add('answered'); navBtn.classList.add('current'); }

      document.getElementById('answerFeedback').textContent = '✓ Answer recorded';
    }

    function nextQuestion() {
      if (currentIdx < QUESTIONS.length - 1) {
        currentIdx++;
        renderQuestion(currentIdx);
      } else {
        submitQuiz();
      }
    }

    function prevQuestion() {
      if (currentIdx > 0) {
        currentIdx--;
        renderQuestion(currentIdx);
      }
    }

    function goToQuestion(idx) {
      currentIdx = idx;
      renderQuestion(idx);
    }

    // ─── TIMER ─────────────────────────────────────────────────────────────
    function startTimer() {
      timerInterval = setInterval(() => {
        timeLeft--;
        const el = document.getElementById('timerVal');
        el.textContent = timeLeft;
        el.className = 'timer-val' + (timeLeft <= 10 ? ' warning' : '');
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          nextQuestion();
        }
      }, 1000);
    }

    function resetTimer() {
      clearInterval(timerInterval);
      timeLeft = 30;
      const el = document.getElementById('timerVal');
      el.textContent = timeLeft;
      el.className = 'timer-val';
      startTimer();
    }

    // ─── SUBMIT ────────────────────────────────────────────────────────────
    function submitQuiz() {
      clearInterval(timerInterval);
      quizSubmitted = true;

      // Calculate results
      let score = 0, correct = 0, wrong = 0, unattempted = 0, maxScore = 0;
      QUESTIONS.forEach((q, i) => {
        maxScore += q.marks;
        if (userAnswers[i] === -1) unattempted++;
        else if (userAnswers[i] === q.correct) { score += q.marks; correct++; }
        else wrong++;
      });

      const pct = Math.round((score / maxScore) * 100);
      let grade = 'F';
      if (pct >= 90) grade = 'A+';
      else if (pct >= 80) grade = 'A';
      else if (pct >= 70) grade = 'B';
      else if (pct >= 60) grade = 'C';
      else if (pct >= 50) grade = 'D';

      // Save to sessionStorage
      sessionStorage.setItem('quizResult', JSON.stringify({
        score, maxScore, correct, wrong, unattempted, pct, grade,
        userAnswers: userAnswers,
        questions: QUESTIONS
      }));

      window.location.href = 'result.html';
    }

    // ─── START ─────────────────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
